yaml_version: 6

project:
  title:       "Contador UART Simple"
  author:      "Richard Tarqui"
  discord:     ""
  description: "Timer countdown controlado por UART. Recibe comandos serie a 9600 baud y reporta estado activo/inactivo por TX."
  language:    "Verilog"
  clock_hz:    50000000

  tiles: "1x1"

  top_module: "tt_um_Richard_Tarqui_contador_uart_simple"

  source_files:
    - tt_um_Richard_Tarqui_contador_uart_simple.v
    - uart_rx.v
    - uart_tx.v
    - cmd_decoder.v
    - timer_simple.v

  pinout:
    ui[0]: "RX - UART input 9600 baud 8N1"
    ui[1]: ""
    ui[2]: ""
    ui[3]: ""
    ui[4]: ""
    ui[5]: ""
    ui[6]: ""
    ui[7]: ""
    uo[0]: "TX - UART output 9600 baud 8N1"
    uo[1]: "activo - HIGH while timer is running"
    uo[2]: ""
    uo[3]: ""
    uo[4]: ""
    uo[5]: ""
    uo[6]: ""
    uo[7]: ""
    uio[0]: ""
    uio[1]: ""
    uio[2]: ""
    uio[3]: ""
    uio[4]: ""
    uio[5]: ""
    uio[6]: ""
    uio[7]: ""

  how_it_works: |
    This project implements a simple UART-controlled countdown timer.
    It receives commands via UART (9600 baud, 8N1) on pin ui_in[0] (RX).
    The incoming byte is decoded by cmd_decoder which extracts whether
    to start the timer and the duration (up to 24 bits). Once started,
    timer_simple counts down using the system clock. While running,
    the activo signal is HIGH. Status is continuously transmitted back
    via UART TX on uo_out[0]: 0x01 while active, 0x00 when finished.

  how_to_test: |
    Connect a USB-to-UART adapter (3.3V) to the board:
    TX of adapter to ui_in[0], RX of adapter to uo_out[0].
    Open a serial terminal at 9600 baud, 8N1, no parity.
    Send a command byte encoding start=1 and a countdown duration.
    Observe uo_out[1] (activo) go HIGH, then LOW when done.
    Read the UART RX stream: 0x01 while running, 0x00 when finished.

  external_hardware: |
    USB-to-UART adapter 3.3V logic (e.g. FTDI FT232RL or CP2102).
    Optional LED on uo_out[1] to monitor activo signal visually.
