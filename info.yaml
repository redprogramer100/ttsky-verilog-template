# Tiny Tapeout project information
project:
  title:        "UART Frequency Meter & Timer"
  author:       "Richard Alfredo Tarqui Mamani and Gustavo Ismael Chavez Mamani"
  discord:      "tu_usuario_discord" # <-- REEMPLAZA ESTO (ej. gishmael#1234)
  description:  "Advanced frequency meter and pulse counter controlled by UART with programmable time window."
  language:     "Verilog"
  clock_hz:     50000000
  tiles:        "1x1"
  top_module:   "tt_um_Richard_Tarqui_contador_uart_simple"
  source_files:
    - "tt_um_Richard_Tarqui_contador_uart_simple.v"
    - "uart_rx.v"
    - "uart_tx.v"
    - "uart_parser.v"
    - "uart_trama_sender.v"
    - "temporizador_programable.v"
    - "contador_pulsos.v"
    - "frecuencimetro.v"

pinout:
  # Inputs
  ui[0]: "RX - UART input (115200 baud)"
  ui[1]: "Signal Input - External pulse to be measured"
  ui[2]: "none"
  ui[3]: "none"
  ui[4]: "none"
  ui[5]: "none"
  ui[6]: "none"
  ui[7]: "none"
  # Outputs
  uo[0]: "TX - UART telemetry output"
  uo[1]: "Active - HIGH while timer is running"
  uo[2]: "Trama OK - Pulse when data frame is sent"
  uo[3]: "none"
  uo[4]: "none"
  uo[5]: "none"
  uo[6]: "none"
  uo[7]: "none"
  # Bidirectional pins
  uio[0]: "none"
  uio[1]: "none"
  uio[2]: "none"
  uio[3]: "none"
  uio[4]: "none"
  uio[5]: "none"
  uio[6]: "none"
  uio[7]: "none"

yaml_version: 6
