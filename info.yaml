# Tiny Tapeout project information
project:
  title:        "Contador UART Simple" # Mantenemos tu título original
  author:       "Richard Alfredo Tarqui Mamani and Gustavo Ismael Chavez Mamani"
  discord:      ""
  description:  "Medidor de frecuencia y contador de pulsos con timer controlado por UART a 115200 baud."
  language:     "Verilog"
  clock_hz:     50000000
  tiles:        "1x1"
  top_module:   "tt_um_Richard_Tarqui_contador_uart_simple"
  source_files:
    - "tt_um_Richard_Tarqui_contador_uart_simple.v"
    - "uart_rx.v"
    - "uart_tx.v"
    - "uart_parser.v"
    - "uart_trama_sender.v"
    - "temporizador_programable.v"
    - "contador_pulsos.v"
    - "frecuencimetro.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "RX - UART input 115200 baud 8N1"
  ui[1]: "Signal input to measure"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""
  # Outputs
  uo[0]: "TX - UART output 115200 baud 8N1"
  uo[1]: "trama_ok - HIGH pulse when TX frame ends"
  uo[2]: "activo - HIGH while timer is running"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""
  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6