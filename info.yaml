# Tiny Tapeout project info
project:
  title:        "Contador UART Simple"
  author:       "Richard Tarqui"
  discord:      ""          # tu usuario de Discord si tienes (opcional)
  description:  "Timer countdown controlado por UART. Recibe comandos serie a 9600 baud y reporta el estado activo/inactivo por TX."
  language:     "Verilog"
  clock_hz:     50000000   # 50 MHz

  # ── Pines de entrada ui_in ──────────────────────────────────
  inputs:
    - "rx (UART RX, 9600 baud 8N1)"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"

  # ── Pines de salida uo_out ──────────────────────────────────
  outputs:
    - "tx (UART TX, 9600 baud 8N1)"
    - "activo (HIGH mientras el timer corre)"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"

  # ── IO bidireccional uio ─────────────────────────────────────
  bidirectional:
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"
    - "none"

  # ── Opciones ─────────────────────────────────────────────────
  uses_clock:        true
  uses_reset:        true   # rst_n activo en LOW
  reset_active_low:  true

  # ── Documentación ────────────────────────────────────────────
  how_it_works: |
    This project implements a simple UART-controlled countdown timer.
    It receives commands via UART (9600 baud, 8N1) on pin ui_in[0] (RX).
    The incoming byte is decoded by a command interpreter (cmd_decoder)
    that extracts whether to start the timer and the duration (up to 24 bits).
    Once started, timer_simple counts down using the system clock.
    While running, the activo signal is HIGH. Status is continuously
    transmitted back via UART TX on uo_out[0]: 0x01 while active,
    0x00 when finished.

  how_to_test: |
    1. Connect a USB-to-UART adapter (3.3V) to the board:
       TX of adapter -> ui_in[0], RX of adapter -> uo_out[0].
    2. Open a serial terminal at 9600 baud, 8N1, no parity.
    3. Send a command byte encoding start=1 and a countdown duration.
    4. Observe uo_out[1] (activo) go HIGH, then LOW when done.
    5. Read the UART RX stream: 0x01 while running, 0x00 when finished.
    6. Send reset command byte or assert rst_n LOW to reset the timer.

  external_hardware: |
    - USB-to-UART adapter, 3.3V logic (e.g. FTDI FT232RL or CP2102)
    - Optional: LED on uo_out[1] to monitor activo signal visually
