# Tiny Tapeout project information
project:
  title:        "Medidor y Temporizador UART"
  author:       "Richard Alfredo Tarqui Mamani y Gustavo Ismael Chavez Mamani"
  discord:      ""
  description:  "Frecuencimetro, contador de pulsos y temporizador programable controlados por UART a 115200 baudios."
  language:     "Verilog"
  clock_hz:     50000000
  tiles:        "1x1"     
  top_module:   "tt_um_Richard_Tarqui_contador_uart_simple"
  source_files:
    - "tt_um_Richard_Tarqui_contador_uart_simple.v"
    - "uart_rx.v"
    - "uart_tx.v"
    - "uart_parser.v"
    - "temporizador_programable.v"
    - "frecuencimetro.v"
    - "contador_pulsos.v"
    - "uart_trama_sender.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "UART RX (Comandos)"
  ui[1]: "Señal externa a medir"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""
  # Outputs
  uo[0]: "UART TX (Telemetría)"
  uo[1]: "Trama OK (Pulso)"
  uo[2]: "Sistema Activo (Medición)"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""
  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
